# ~/.tmux.conf
# Generated by samux: sane tmux configuration.
# https://nathabonfim59.github.io/samux/
#
# Theme: Dracula Pro
# Prefix is C-b. Reload after editing:  tmux source-file ~/.tmux.conf

# --- Palette: Dracula Pro ---
# accent   #E57F6C
# bg       #22212C
# cur      #44475A
# fg       #F8F8F2
# comment  #7970A9
# cyan     #80FFEA
# green    #8AFF80
# orange   #FFCA80
# pink     #FF80BF
# red      #FF9580
# yellow   #FFFF80

# --- Core sane defaults ---
set -s escape-time 0

# --- VI copy mode ---
setw -g mode-keys vi

# --- Mouse: click windows, resize panes, scroll ---
set -g mouse on

# --- Windows start at 1 and renumber on close ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Alt + number to switch windows (like a browser) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Alt + h/l: prev/next window, Alt + j/k: swap window position ---
bind -n M-h select-window -t :-
bind -n M-l select-window -t :+
bind -n M-j swap-window -t :-
bind -n M-k swap-window -t :+

# --- Extended keys + passthrough (Claude Code compatibility) ---
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- True color ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB,*256col*:RGB"

# --- Wayland: propagate env so clipboard and battery scripts work ---
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR SSH_AUTH_SOCK"
set-hook -g client-attached 'run-shell "tmux setenv -g WAYLAND_DISPLAY #{WAYLAND_DISPLAY}"'

# --- Bell and activity indicator ---
set -g visual-bell off
set -g bell-action other
setw -g monitor-bell on

# --- Rename windows whose pane is running claude to its title ---
set-hook -g pane-title-changed 'if-shell "[ \"#{pane_current_command}\" = \"claude\" ]" "rename-window \"#{pane_title}\""'

# --- Pane borders ---
set -g pane-border-style "fg=#7970A9"
set -g pane-active-border-style "fg=#E57F6C"

# --- Message prompt and copy mode highlight ---
set -g message-style "fg=#F8F8F2,bg=#44475A"
setw -g mode-style "fg=#22212C,bg=#E57F6C"

# --- Status bar ---
set -g status-style "fg=#F8F8F2,bg=#22212C"
set -g status-interval 5
set -g status-position top
set -g status-left-length 40
set -g status-left "#[fg=#22212C,bg=#E57F6C,bold] #S #[fg=#E57F6C,bg=#22212C,nobold] "
set -g status-right-length 80
set -g status-right "#[fg=#FF80BF] git:#(git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#7970A9]#(~/.config/samux/scripts/battery.sh) #[fg=#7970A9]%a %d %b #[fg=#22212C,bg=#E57F6C,bold] %H:%M "
setw -g window-status-format "#[fg=#7970A9,bg=#22212C]  #I:#W#F  "
setw -g window-status-current-format "#[fg=#F8F8F2,bg=#44475A,bold]  #I:#W  "
setw -g window-status-separator ""

